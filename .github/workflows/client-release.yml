name: Release Client

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload client assets to"
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-release:
    name: Create release notes
    runs-on: ubuntu-latest

    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          generate_release_notes: true

  build-release-client:
    name: ${{ matrix.name }}
    needs: create-release
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            asset-name: MacroSignageClient-Windows.exe
            executable-path: dist/MacroSignageClient.exe
          - name: macOS
            os: macos-latest
            asset-name: MacroSignageClient-macOS
            executable-path: dist/MacroSignageClient
          - name: Linux
            os: ubuntu-latest
            asset-name: MacroSignageClient-Linux
            executable-path: dist/MacroSignageClient

    defaults:
      run:
        shell: bash
        working-directory: client

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            client/uv.lock

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Linux GUI runtime libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libgl1 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxkbcommon-x11-0

      - name: Install client dependencies
        run: uv sync --extra build --frozen

      - name: Verify client entry point
        run: uv run macrosignage-client --help

      - name: Build executable
        run: uv run pyinstaller --onefile --windowed --name MacroSignageClient macrosignage_client/app.py

      - name: Rename release asset
        run: mv "${{ matrix.executable-path }}" "dist/${{ matrix.asset-name }}"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: client/dist/${{ matrix.asset-name }}
          fail_on_unmatched_files: true
