name: Build Client

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-client:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            artifact-name: MacroSignageClient-Windows
          - name: macOS
            os: macos-latest
            artifact-name: MacroSignageClient-macOS
          - name: Linux
            os: ubuntu-latest
            artifact-name: MacroSignageClient-Linux

    defaults:
      run:
        working-directory: client

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            client/uv.lock

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Linux GUI runtime libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libgl1 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxkbcommon-x11-0

      - name: Install client dependencies
        run: uv sync --extra build --frozen

      - name: Verify client entry point
        run: uv run macrosignage-client --help

      - name: Build executable
        run: uv run pyinstaller --onefile --windowed --name MacroSignageClient macrosignage_client/app.py

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: client/dist/*
          if-no-files-found: error
          retention-days: 14
