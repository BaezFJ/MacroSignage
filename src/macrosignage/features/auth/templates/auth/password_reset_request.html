{% extends 'layouts/auth.html' %}

{% block content %}
    <div class="mb-4">
        <p class="eyebrow">Account Recovery</p>
        <h1 class="h3 mb-1">Reset password</h1>
        <p class="text-secondary mb-0">Enter the email address for your account.</p>
    </div>

    <form method="post" novalidate>
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-4">
            <label class="form-label" for="resetEmail">Email</label>
            <input id="resetEmail"
                   class="form-control {% if errors.get('email') %}is-invalid{% endif %}"
                   type="email"
                   name="email"
                   value="{{ form_data.email or '' }}"
                   autocomplete="email"
                   required>
            {% if errors.get('email') %}
                <div class="invalid-feedback">{{ errors.email }}</div>
            {% endif %}
        </div>

        <div class="d-grid gap-2">
            <button class="btn btn-primary" type="submit">Prepare reset link</button>
            <a class="btn btn-outline-secondary" href="{{ url_for('auth.get_login') }}">Back to sign in</a>
        </div>
    </form>

    {% if reset_url %}
        <div class="alert alert-info mt-3 mb-0">
            <p class="fw-semibold mb-1">Development reset link</p>
            <a class="text-break" href="{{ reset_url }}">{{ reset_url }}</a>
        </div>
    {% endif %}
{% endblock %}
