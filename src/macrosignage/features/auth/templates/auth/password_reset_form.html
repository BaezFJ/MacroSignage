{% extends 'layouts/auth.html' %}

{% block content %}
    <div class="mb-4">
        <p class="eyebrow">Account Recovery</p>
        <h1 class="h3 mb-1">Set new password</h1>
        <p class="text-secondary mb-0">Choose a new password for your account.</p>
    </div>

    <form method="post" action="{{ url_for('auth.reset_password', token=token) }}" novalidate>
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
            <label class="form-label" for="newPassword">New password</label>
            <input id="newPassword"
                   class="form-control {% if errors.get('password') %}is-invalid{% endif %}"
                   type="password"
                   name="password"
                   autocomplete="new-password"
                   required>
            {% if errors.get('password') %}
                <div class="invalid-feedback">{{ errors.password }}</div>
            {% endif %}
        </div>

        <div class="mb-4">
            <label class="form-label" for="newPasswordConfirm">Confirm password</label>
            <input id="newPasswordConfirm"
                   class="form-control {% if errors.get('confirm_password') %}is-invalid{% endif %}"
                   type="password"
                   name="confirm_password"
                   autocomplete="new-password"
                   required>
            {% if errors.get('confirm_password') %}
                <div class="invalid-feedback">{{ errors.confirm_password }}</div>
            {% endif %}
        </div>

        <button class="btn btn-primary w-100" type="submit">Update password</button>
    </form>
{% endblock %}
