{% extends 'layouts/_base.html' %}

{% block body %}
    <main class="display-offline display-player-{{ display.orientation | lower }}"
          aria-label="{{ display.name }} offline">
        <section class="display-offline-panel">
            <p class="display-offline-kicker">Offline</p>
            <h1>{{ display.name }}</h1>
            <p>{{ display.location or 'This display' }} is not currently available.</p>
        </section>
    </main>
{% endblock %}
