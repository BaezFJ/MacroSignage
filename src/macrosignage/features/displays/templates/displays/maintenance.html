{% extends 'layouts/_base.html' %}

{% block body %}
    <main class="display-maintenance display-player-{{ display.orientation | lower }}"
          aria-label="{{ display.name }} maintenance">
        <section class="display-maintenance-panel">
            <p class="display-maintenance-kicker">Maintenance</p>
            <h1>{{ display.name }}</h1>
            <p>{{ display.location or 'This display' }} is temporarily unavailable.</p>
        </section>
    </main>
{% endblock %}
